# PostgreSQL credentials for auth-service database.
#
# ⚠️  DO NOT commit real values to git.
#     Values below are base64-encoded PLACEHOLDERS.
#
# Generate real values:
#   echo -n "your-actual-password" | base64
#
# Or create imperatively (recommended):
#   kubectl create secret generic auth-postgres-secret \
#     --namespace auth-postgres \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=yourStrongPassword \
#     --from-literal=POSTGRES_DB=auth_db

apiVersion: v1
kind: Secret
metadata:
  name: auth-postgres-secret
  namespace: auth-postgres
  labels:
    app.kubernetes.io/name:      auth-postgres
    app.kubernetes.io/component: secret
type: Opaque
data:
  # echo -n "postgres" | base64
  POSTGRES_USER: cG9zdGdyZXM=
  # echo -n "yourStrongPassword" | base64
  POSTGRES_PASSWORD: eW91clN0cm9uZ1Bhc3N3b3Jk
  # echo -n "auth_db" | base64
  POSTGRES_DB: YXV0aF9kYg==