# PostgreSQL Services for auth-service database.

apiVersion: v1
kind: Service
metadata:
  name: auth-postgres-headless
  namespace: auth-postgres
  labels:
    app.kubernetes.io/name:      auth-postgres
    app.kubernetes.io/component: database-headless
spec:
  type: ClusterIP
  clusterIP: None            # This makes it headless — no virtual IP, DNS returns pod IPs directly
  selector:
    app: auth-postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: postgres
      protocol:   TCP

---

apiVersion: v1
kind: Service
metadata:
  name: auth-postgres
  namespace: auth-postgres
  labels:
    app.kubernetes.io/name:      auth-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: auth-postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: postgres
      protocol:   TCP